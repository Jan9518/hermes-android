
name: Android Build
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Build with Gradle
        run: |
          chmod +x hermes-android-bridge/gradlew
          hermes-android-bridge/gradlew assembleDebug
        working-directory: hermes-android-bridge
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hermes-android-debug
          path: hermes-android-bridge/app/build/outputs/apk/debug/app-debug.apk
